<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>دعوة زفاف</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- الصفحة الرئيسية -->

    <div class="hero">

        <h1>إيميلي & جيمس</h1>

        <p>يتشرفان بدعوتكم</p>

        <h2>لمشاركتهم فرحة حفل زفافهما</h2>

        <button id="openBtn">
            افتح الدعوة
        </button>

    </div>

    <!-- بطاقة الدعوة -->

    <div id="card" class="hidden">

        <section>

            <h2>موعد الزفاف</h2>

            <h3>السبت</h3>

            <p>28 أغسطس 2027</p>

            <p>الساعة 4:00 مساءً</p>

        </section>

        <section>

            <h2>مكان الحفل</h2>

            <p>قاعة رويال جاردن</p>

            <a href="https://maps.google.com" target="_blank">
                فتح الموقع على خرائط جوجل
            </a>

        </section>

        <section>

            <h2>العد التنازلي</h2>

            <div id="countdown"></div>

        </section>

        <section>

            <h2>معرض الصور</h2>

            <img src="images/bride.jpg" alt="Bride">

            <img src="images/groom.jpg" alt="Groom">

        </section>

        <section>

            <h2>تأكيد الحضور</h2>

            <form>

                <input type="text" placeholder="الاسم">

                <input type="email" placeholder="البريد الإلكتروني">

                <select>

                    <option>سأحضر</option>

                    <option>لن أتمكن من الحضور</option>

                </select>

                <br><br>

                <button type="submit">
                    إرسال
                </button>

            </form>

        </section>

    </div>

    <!-- موسيقى الخلفية -->

    <audio id="bgMusic" preload="auto" loop>
        <source src="music/wedding.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script src="script.js"></script>

</body>

</html>
